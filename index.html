<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cartas Pokémon</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
    margin: 0;
    padding: 0;
}

h1 {
    margin-top: 30px;
    color: #444;
}

.container {
    margin-top: 20px;
}

input {
    padding: 12px;
    width: 220px;
    border-radius: 20px;
    border: none;
    outline: none;
    box-shadow: 0 0 5px #aaa;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    background: #a0c4ff;
    color: white;
    cursor: pointer;
    margin-left: 10px;
    transition: 0.3s;
}

button:hover {
    background: #6699ff;
}

#resultados {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
}

.card {
    background: white;
    margin: 15px;
    padding: 15px;
    width: 200px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card h3 {
    margin: 10px 0;
    color: #333;
}

.card p {
    margin: 5px 0;
    color: #666;
}

.card img {
    margin-top: 10px;
    border-radius: 10px;
}

.footer {
    margin-top: 40px;
    padding: 10px;
    color: #555;
}
</style>

</head>

<body>

<h1>✨ Cartas Pokémon ✨</h1>

<div class="container">
    <input type="text" id="busqueda" placeholder="Ej: pikachu">
    <button onclick="buscar()">Buscar</button>
</div>

<div id="resultados"></div>

<div class="footer">
    Hecho con Java + HTML 💻
</div>

<script>
function buscar() {
    let nombre = document.getElementById("busqueda").value;

    fetch(`http://localhost:4000/cartas?nombre=${nombre}`)
    .then(res => res.json())
    .then(data => {

        let contenedor = document.getElementById("resultados");
        contenedor.innerHTML = "";

        if (data.length === 0) {
            contenedor.innerHTML = "<p>No se encontraron resultados 😢</p>";
            return;
        }

        data.forEach(carta => {

            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h3>${carta.nombre}</h3>
                <p><b>Tipo:</b> ${carta.tipo}</p>
                <p><b>HP:</b> ${carta.hp}</p>
                <img src="${carta.imagen}" width="150">
            `;

            contenedor.appendChild(div);
        });
    })
    .catch(() => {
        alert("⚠️ El servidor no está corriendo");
    });
}
</script>

</body>
</html>
